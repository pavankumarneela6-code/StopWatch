<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
</head>
<style>
   *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
        overflow:hidden;
    }

    .container{
        width:420px;
        padding:35px;
        text-align:center;
        border-radius:25px;
        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(18px);
        border:1px solid rgba(255,255,255,.2);
        box-shadow:
            0 0 20px rgba(0,255,255,.3),
            0 0 40px rgba(0,140,255,.2),
            inset 0 0 15px rgba(255,255,255,.1);
    }

    .container::before{
        content:"⏱ STOPWATCH";
        display:block;
        color:#00e5ff;
        font-size:28px;
        font-weight:bold;
        letter-spacing:3px;
        margin-bottom:25px;
        text-shadow:0 0 15px cyan;
    }

    #display{
        color:#00ffcc;
        font-size:40px;
        font-family:'Courier New',monospace;
        font-weight:bold;
        letter-spacing:3px;
        padding:18px;
        border-radius:15px;
        background:#000;
        box-shadow:
            inset 0 0 20px #00ffcc,
            0 0 20px #00ffcc;
        margin-bottom:30px;
    }

    .buttons{
        display:flex;
        justify-content:center;
        gap:15px;
    }

    button{
        padding:12px 24px;
        border:none;
        border-radius:12px;
        font-size:16px;
        font-weight:bold;
        color:white;
        cursor:pointer;
        transition:.3s;
    }

    #start{
        background:#00c853;
        box-shadow:0 0 15px #00c853;
    }

    #stop{
        background:#ff1744;
        box-shadow:0 0 15px #ff1744;
    }

    #reset{
        background:#2979ff;
        box-shadow:0 0 15px #2979ff;
    }

    button:hover{
        transform:translateY(-5px) scale(1.08);
    }

    button:active{
        transform:scale(.95);
    }
</style>
<body>
    <div class="container">
        <h1 id="display">00:00:00:00</h1>
        <div class="buttons">
            <button id="start" onclick="startStopwatch()">Start</button>
            <button id="stop" onclick="stopStopwatch()">Stop</button>
            <button id="reset" onclick="resetStopwatch()">Reset</button>
        </div>
    </div>    
    <script>
        let hours = 0;
        let minutes = 0;
        let seconds = 0;
        let milliseconds = 0;
        let timer=null;
        function startStopwatch() {
            if (timer != null) {
               return; 
            }   
            timer=setInterval(runStopwatch, 10);
            function runStopwatch() {
                milliseconds ++;
                if (milliseconds >= 100) {
                    milliseconds = 0;
                    seconds++;
                }
                if (seconds >= 60) {
                    seconds = 0;
                    minutes++;
                }
                if (minutes >= 60) {
                    minutes = 0;
                    hours++;
                }
                document.getElementById("display").innerText = 
                    (hours < 10 ? "0" + hours : hours) + ":" +(minutes < 10 ? "0" + minutes : minutes) + ":" +(seconds < 10 ? "0" + seconds : seconds) + ":" +(milliseconds <10 ? "0" + milliseconds :milliseconds);
            }
        }
        function stopStopwatch() {
            clearInterval(timer);
            timer = null;
        }
        function resetStopwatch() {
            clearInterval(timer);
            timer = null;
            hours = 0;
            minutes = 0;
            seconds = 0;    
            milliseconds = 0;
            document.getElementById("display").innerText = "00:00:00:00";
        }   
    </script>
</body>
</html>
